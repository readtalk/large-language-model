<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e5ddd5;
      max-width: 420px;
      margin: 20px auto;
      border: 12px solid #111;
      border-radius: 42px;
      overflow: hidden;
      height: 680px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    /* Header */
    header {
      height: 58px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      border-bottom: 1px solid #ddd;
    }

    .back-btn { font-size: 26px; color: #075e54; margin-right: 4px; }
    
    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #9c27b0, #e91e63);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .title {
      font-size: 17.5px;
      font-weight: 600;
      color: #111;
    }

    /* Chat Area */
    .chat-area {
      height: calc(100% - 118px);
      background: #e5ddd5;
      background-image: 
        radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1px);
      background-size: 32px 32px;
      padding: 16px 10px 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15.8px;
      line-height: 1.35;
    }

    .user-msg {
      align-self: flex-end;
      background: #00c853;
      color: white;
      border-bottom-right-radius: 6px;
    }

    .assistant-msg {
      align-self: flex-start;
      background: #128c7e;
      color: white;
      border-bottom-left-radius: 6px;
    }

    /* Input Bar */
    .input-bar {
      height: 60px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      padding: 6px 8px;
      gap: 6px;
      border-top: 1px solid #ddd;
    }

    .input-box {
      flex: 1;
      height: 46px;
      background: white;
      border-radius: 999px;
      border: 1px solid #ddd;
      padding: 0 18px;
      font-size: 16px;
      display: flex;
      align-items: center;
      color: #555;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      color: #666;
    }

    .send-btn {
      background: #00c853;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="back-btn">←</div>
    <div class="logo">🌸</div>
    <div class="title">Business Assistant</div>
  </header>

  <!-- Chat Messages -->
  <div class="chat-area">
    <div class="message user-msg">kamu perhatikan ini</div>
    
    <div class="message assistant-msg">
      <strong>Business Assistant</strong><br>
      apa yang belum dimiliki
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="icon-btn">😊</div>
    <div class="icon-btn">📎</div>
    <div class="input-box">Ketik pesan...</div>
    <div class="icon-btn">🎤</div>
    <div class="send-btn">▶</div>
  </div>

</body>
</html>
