<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />		
		<title>READTalk</title>
		<style>			
     { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e5ddd5;
      max-width: 420px;
      margin: 20px auto;
      border: 12px solid #111;
      border-radius: 40px;
      overflow: hidden;
      height: 680px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* Header */
    header {
      height: 60px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 12px;
      border-bottom: 1px solid #ddd;
      position: relative;
    }

    .back-btn { font-size: 28px; color: #075e54; }
    
    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #8e24aa, #d81b60);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
    }

    /* Chat Area */
    .chat-area {
      height: calc(100% - 120px);
      background: #e5ddd5;
      background-image: 
        radial-gradient(#ffffff 1px, transparent 1px);
      background-size: 35px 35px;
      padding: 15px 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Message Bubbles */
    .message {
      max-width: 75%;
      padding: 9px 14px;
      border-radius: 18px;
      font-size: 15.5px;
      line-height: 1.35;
    }

    .user-msg {
      align-self: flex-end;
      background: #00c853;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .assistant-msg {
      align-self: flex-start;
      background: #128c7e;
      color: white;
      border-bottom-left-radius: 5px;
    }

    /* Input Bar */
    .input-bar {
      height: 60px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      padding: 5px 8px;
      gap: 8px;
      border-top: 1px solid #ddd;
    }

    .input-box {
      flex: 1;
      height: 45px;
      background: white;
      border-radius: 25px;
      border: 1px solid #ddd;
      padding: 0 18px;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #555;
    }

    .send-btn {
      background: #00c853;
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 20px;
    }
	</style>
	</head>
	<body>
		<header>
			<h1>READTalk</h1>
			<p>by SOEPARNO ENTERPRISE Corp.</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>
						Hello! I'm Anna Laura AI an virtual assistant for everyone. How can I help you today you?
					</p>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				Laura is thinking.....
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Message"
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">➤</button>
			</div>
		</div>

		<footer>
			<p>Anna Laura AI</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
