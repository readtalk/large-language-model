<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>READTalk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 680px;
      background: #e5ddd5;
      border: 12px solid #111;
      border-radius: 42px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      height: 60px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 12px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .back-btn { font-size: 28px; color: #075e54; }
    
    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #9c27b0, #e91e63);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 600;
    }

    .header-info p {
      font-size: 13px;
      color: #666;
      margin-top: -3px;
    }

    /* Chat Area */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
      background: #e5ddd5;
      background-image: 
        radial-gradient(circle at 30px 30px, rgba(255,255,255,0.7) 1px, transparent 1px);
      background-size: 35px 35px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15.8px;
      line-height: 1.4;
    }

    .user-message {
      align-self: flex-end;
      background: #00c853;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .assistant-message {
      align-self: flex-start;
      background: #128c7e;
      color: white;
      border-bottom-left-radius: 5px;
    }

    /* Typing Indicator */
    .typing-indicator {
      align-self: flex-start;
      background: #128c7e;
      color: white;
      padding: 10px 14px;
      border-radius: 18px;
      font-style: italic;
      display: none;
    }

    .typing-indicator.visible {
      display: block;
    }

    /* Input Area */
    .message-input {
      background: #f0f0f0;
      padding: 8px 10px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      min-height: 46px;
      max-height: 120px;
      padding: 12px 18px;
      border-radius: 25px;
      border: 1px solid #ddd;
      font-size: 16px;
      resize: none;
      background: white;
    }

    .input-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #555;
    }

    #send-button {
      width: 44px;
      height: 44px;
      background: #00c853;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Header -->
    <header>
      <div class="back-btn">←</div>
      <div class="logo">🌸</div>
      <div class="header-info">
        <h1>Business Assistant</h1>
        <p>by SOEPARNO ENTERPRISE Corp.</p>
      </div>
    </header>

    <!-- Chat Messages -->
    <div id="chat-messages" class="chat-messages">
      <!-- chat.js akan mengisi di sini -->
    </div>

    <!-- Typing Indicator -->
    <div id="typing-indicator" class="typing-indicator message">
      Anna Laura is thinking...
    </div>

    <!-- Input Area -->
    <div class="message-input">
      <div class="input-icons">
        <div class="icon-btn">😊</div>
        <div class="icon-btn">📎</div>
      </div>
      <textarea id="user-input" placeholder="Ketik pesan..." rows="1"></textarea>
      <div class="input-icons">
        <div class="icon-btn">🎤</div>
        <button id="send-button">▶</button>
      </div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
