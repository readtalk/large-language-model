<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>READTalk - Anna Laura AI</title>

    <style>
        :root {
            --primary-color: #000000;
            --primary-hover: #2f2f2f;

            --background-color: #f8f8f8;
            --light-bg: #f3f4f6;

            --border-color: #e5e7eb;

            --text-color: #1f2937;
            --text-light: #6b7280;

            --user-msg-bg: #cfcfcf;
            --assistant-msg-bg: #ffffff;

            --code-bg: #1e1e1e;
            --code-header: #2b2b2b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                Oxygen,
                Ubuntu,
                Cantarell,
                sans-serif;

            background: var(--background-color);
            color: var(--text-color);

            display: flex;
            flex-direction: column;

            max-width: 800px;
            margin: 0 auto;

            padding: 0.75rem;
        }

        header {
            flex-shrink: 0;

            padding: 0.5rem 0 0.75rem;
            margin-bottom: 0.75rem;

            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.1rem;
        }

        header p {
            font-size: 1rem;
            color: var(--text-color);
        }

        .chat-container {
            flex: 1;

            display: flex;
            flex-direction: column;

            overflow: hidden;

            border: 1px solid var(--border-color);
            border-radius: 16px;

            background: white;
        }

        .chat-messages {
            flex: 1;

            overflow-y: auto;

            padding: 1rem;

            background: var(--light-bg);

            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #c9c9c9;
            border-radius: 999px;
        }

        .message {
            width: fit-content;
            max-width: 78%;

            padding: 0.9rem 1rem;

            margin-bottom: 1rem;

            border-radius: 16px;

            overflow-wrap: anywhere;

            animation: fadeIn 0.15s ease;
        }

        .assistant-message {
            background: var(--assistant-msg-bg);

            margin-right: auto;

            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: var(--user-msg-bg);

            margin-left: auto;

            border-bottom-right-radius: 4px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* =========================
           MARKDOWN
        ========================= */

        .message-content {
            font-size: 1rem;
            line-height: 1.7;
        }

        .message-content p {
            margin-bottom: 0.7rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content h1,
        .message-content h2,
        .message-content h3 {
            margin: 0.8rem 0 0.5rem;
            line-height: 1.4;
        }

        .message-content h1 {
            font-size: 1.5rem;
        }

        .message-content h2 {
            font-size: 1.3rem;
        }

        .message-content h3 {
            font-size: 1.1rem;
        }

        .message-content ul,
        .message-content ol {
            padding-left: 1.4rem;
            margin: 0.6rem 0;
        }

        .message-content li {
            margin-bottom: 0.25rem;
        }

        .message-content strong {
            font-weight: 700;
        }

        .message-content em {
            font-style: italic;
        }

        .inline-code {
            background: #e8e8e8;

            padding: 0.15rem 0.4rem;

            border-radius: 6px;

            font-family: monospace;
            font-size: 0.92em;

            color: #d63384;
        }

        /* =========================
           CODE BLOCK
        ========================= */

        .code-block {
            margin: 1rem 0;

            overflow: hidden;

            border-radius: 12px;

            background: var(--code-bg);
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0.7rem 0.9rem;

            background: var(--code-header);

            border-bottom: 1px solid #3b3b3b;
        }

        .code-lang {
            color: #cccccc;

            font-size: 0.8rem;
            font-family: monospace;

            text-transform: lowercase;
        }

        .copy-code-btn {
            border: none;

            padding: 0.35rem 0.7rem;

            border-radius: 8px;

            background: #3a3a3a;
            color: white;

            cursor: pointer;

            font-size: 0.75rem;
            font-weight: 600;

            transition: background 0.2s ease;
        }

        .copy-code-btn:hover {
            background: #4d4d4d;
        }

        .code-block pre {
            overflow-x: auto;

            padding: 1rem;

            margin: 0;
        }

        .code-block code {
            color: #dddddd;

            font-size: 0.9rem;
            line-height: 1.7;
            font-family:
                "SF Mono",
                Monaco,
                Consolas,
                "Courier New",
                monospace;

            white-space: pre-wrap;
            word-break: break-word;
        }

        /* =========================
           TYPING
        ========================= */

        .typing-indicator {
            display: none;

            padding: 0 1rem 0.75rem;

            color: var(--text-light);

            font-size: 0.9rem;
            font-style: italic;

            background: var(--light-bg);
        }

        .typing-indicator.visible {
            display: block;
        }

        /* =========================
           INPUT AREA
        ========================= */

        .message-input {
            position: relative;

            display: flex;
            align-items: flex-end;
            gap: 0.75rem;

            padding: 0.85rem;

            border-top: 1px solid var(--border-color);

            background: white;

            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;

            display: flex;
            align-items: flex-end;
            gap: 0.5rem;

            padding: 0.6rem 0.75rem;

            border: 1px solid var(--border-color);
            border-radius: 16px;

            background: white;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-color);

            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        #emoji-button {
            border: none;
            background: transparent;

            cursor: pointer;

            font-size: 1.5rem;

            line-height: 1;
        }

        #user-input {
            flex: 1;

            border: none;
            outline: none;
            resize: none;

            background: transparent;

            font-size: 1rem;
            font-family: inherit;

            line-height: 1.5;

            max-height: 120px;

            overflow-y: auto;
        }

        #send-button {
            width: 50px;
            height: 50px;

            flex-shrink: 0;

            border: none;
            border-radius: 50%;

            background: var(--primary-color);
            color: white;

            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 1.3rem;

            transition:
                transform 0.15s ease,
                background 0.2s ease;
        }

        #send-button:hover {
            background: var(--primary-hover);
        }

        #send-button:active {
            transform: scale(0.96);
        }

        #send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* =========================
           EMOJI PICKER
        ========================= */

        .emoji-picker {
            position: absolute;

            left: 1rem;
            bottom: 5.5rem;

            width: min(350px, calc(100vw - 2rem));

            max-height: 280px;

            overflow-y: auto;

            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.3rem;

            padding: 0.75rem;

            background: white;

            border: 1px solid var(--border-color);
            border-radius: 16px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);

            z-index: 999;
        }

        .emoji-picker.show {
            display: grid;
        }

        .emoji-item {
            display: flex;
            align-items: center;
            justify-content: center;

            padding: 0.35rem;

            border-radius: 10px;

            cursor: pointer;

            font-size: 1.3rem;

            transition:
                background 0.15s ease,
                transform 0.15s ease;
        }

        .emoji-item:hover {
            background: var(--light-bg);
            transform: scale(1.08);
        }

        /* =========================
           MOBILE
        ========================= */

        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .message {
                max-width: 88%;
            }

            .chat-messages {
                padding: 0.75rem;
            }

            .message-input {
                padding: 0.7rem;
            }

            #send-button {
                width: 46px;
                height: 46px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>READTalk</h1>
        <p>Anna Laura AI</p>
    </header>

    <main class="chat-container">
        <div id="chat-messages" class="chat-messages">
            <div class="message assistant-message">
                <div class="message-content">
                    <p>
                        Hello! please my nickname is Laura, a virtual assistant
                        for you. How can I help you today? 🙂
                    </p>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            🧠 Laura is thinking...
        </div>

        <div class="message-input">
            <div class="input-wrapper">
                <button id="emoji-button" title="Emoji">
                    🎭
                </button>

                <textarea
                    id="user-input"
                    rows="1"
                    autofocus
                    placeholder="Message"
                ></textarea>
            </div>

            <button id="send-button">
                ➤
            </button>

            <div id="emoji-picker" class="emoji-picker">
                <div class="emoji-item">😀</div>
                <div class="emoji-item">😂</div>
                <div class="emoji-item">🤣</div>
                <div class="emoji-item">🙂</div>
                <div class="emoji-item">😉</div>
                <div class="emoji-item">😍</div>
                <div class="emoji-item">🥰</div>
                <div class="emoji-item">😘</div>
                <div class="emoji-item">🤔</div>
                <div class="emoji-item">😎</div>
                <div class="emoji-item">🥳</div>
                <div class="emoji-item">😭</div>
                <div class="emoji-item">😡</div>
                <div class="emoji-item">🔥</div>
                <div class="emoji-item">💯</div>
                <div class="emoji-item">✨</div>
                <div class="emoji-item">❤️</div>
                <div class="emoji-item">👍</div>
                <div class="emoji-item">👏</div>
                <div class="emoji-item">🙌</div>
                <div class="emoji-item">🤝</div>
                <div class="emoji-item">🎉</div>
                <div class="emoji-item">⭐</div>
                <div class="emoji-item">🌟</div>
            </div>
        </div>
    </main>

    <script src="chat.js"></script>
</body>
</html>
