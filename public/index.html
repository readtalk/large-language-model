<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />		
    <title>Anna Laura AI - Coding Assistant</title>
    
    <!-- Highlight.js untuk syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg-bg: #6366f1;
            --assistant-msg-bg: #f1f5f9;
            --text-color: #1e2937;
        }
        
        .dark {
            --bg-color: #0f172a;
            --chat-bg: #1e2937;
            --user-msg-bg: #6366f1;
            --assistant-msg-bg: #334155;
            --text-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 1.5rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }
        .dark header { background: #1e2937; border-color: #475569; }

        h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .subtitle { color: #64748b; font-size: 1rem; }

        .chat-container {
            max-width: 900px;
            margin: 1rem auto;
            height: calc(100vh - 220px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            background: var(--chat-bg);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.6;
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant-message {
            align-self: flex-start;
            background: var(--assistant-msg-bg);
            border-bottom-left-radius: 4px;
        }

        pre {
            position: relative;
            margin: 1rem 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--chat-bg);
            border-top: 1px solid #e2e8f0;
        }

        .quick-btn {
            padding: 8px 14px;
            background: #e0e7ff;
            border: none;
            border-radius: 9999px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .dark .quick-btn { background: #475569; color: white; }

        /* Input Area */
        .message-input {
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            background: var(--chat-bg);
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Anna Laura AI</h1>
        <p class="subtitle">Coding Assistant • Pair Programmer yang sabar &amp; teliti</p>
    </header>

    <div class="chat-container">
        <div id="chat-messages" class="chat-messages"></div>

        <div class="quick-prompts" id="quick-prompts">
            <!-- Quick buttons akan ditambah via JS -->
        </div>

        <div class="typing-indicator" id="typing-indicator" style="display:none; padding:1rem; color:#64748b;">
            Anna Laura sedang berpikir...
        </div>

        <div class="message-input">
            <textarea id="user-input" placeholder="Jelaskan apa yang ingin kamu kerjakan..." rows="1"></textarea>
            <button id="send-button">➤</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="chat.js"></script>
</body>
</html>
